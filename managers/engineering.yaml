id: engineering-manager
name: Engineering Manager
parent: priya
runner: claude-code
model: claude-sonnet-5
charter: >-
  Features, bugs, refactors, tests, PRs, and releases for the active project. Follows the
  project's own engineering workflow (commands, agents, skills) rather than inventing one.
capabilities:
  - feature
  - bug
  - refactor
  - test
  - pr
worker:
  model: claude-sonnet-5
  allowedTools:
    - Read
    - Write
    - Edit
    - Glob
    - Grep
    - "Bash(git *)"
  useWorktree: true
